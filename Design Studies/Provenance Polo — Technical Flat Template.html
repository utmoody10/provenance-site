<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Provenance Polo — Master Technical Flat Template</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#e8e4de;display:flex;height:100vh;overflow:hidden}
#panel{width:230px;min-width:230px;background:#08121A;color:#FAF1E5;padding:14px 12px;overflow-y:auto;flex-shrink:0;font-size:10px}
#panel .brand{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#C4973A;font-weight:bold;margin-bottom:2px}
#panel .doc{font-size:8px;opacity:.65;margin-bottom:2px}
#panel .ver{font-size:8px;color:#C4973A;margin-bottom:14px}
.group-label{font-size:8px;text-transform:uppercase;letter-spacing:.1em;opacity:.5;margin:12px 0 5px;border-top:1px solid rgba(255,255,255,.1);padding-top:8px}
.layer-toggle{display:flex;align-items:center;gap:7px;padding:3px 4px;cursor:pointer;border-radius:3px;transition:background .12s}
.layer-toggle:hover{background:rgba(255,255,255,.06)}
.layer-toggle label{font-size:9.5px;cursor:pointer;color:#FAF1E5;line-height:1.3;flex:1}
.layer-toggle input[type=checkbox]{accent-color:#C4973A;flex-shrink:0}
.swatch{width:9px;height:9px;border-radius:2px;flex-shrink:0}
#canvas-wrap{flex:1;overflow:auto;padding:20px;display:flex;justify-content:flex-start;align-items:flex-start}
svg{background:white;box-shadow:0 2px 24px rgba(0,0,0,.18);display:block;min-width:1200px}
/* SVG Classes */
.body{fill:white;stroke:#08121A;stroke-width:1.5;stroke-linejoin:round}
.sleeve{fill:white;stroke:#08121A;stroke-width:1.4;stroke-linejoin:round}
.collar{fill:#F5F0E8;stroke:#08121A;stroke-width:1.2;stroke-linejoin:round}
.collar-leaf{fill:#F5F0E8;stroke:#08121A;stroke-width:1.1}
.collar-stand{fill:#EDE8E0;stroke:#08121A;stroke-width:.8;stroke-dasharray:4,3}
.outer-placket{fill:#FAFAFA;stroke:#08121A;stroke-width:1.1}
.inner-placket{fill:#F0EDE8;stroke:#08121A;stroke-width:.7;stroke-dasharray:5,3}
.yoke{fill:none;stroke:#08121A;stroke-width:1.0}
.seam-internal{fill:none;stroke:#08121A;stroke-width:.8;stroke-dasharray:5,3}
.fold{fill:none;stroke:#666;stroke-width:.55;stroke-dasharray:3,2.5}
.fold-hatch{fill:none;stroke:#aaa;stroke-width:.4}
.fold-region{fill:#f0ece6;stroke:#999;stroke-width:.5;stroke-dasharray:3,2}
.topstitch{fill:none;stroke:#08121A;stroke-width:.5;stroke-dasharray:2.5,3}
.bartack{fill:#08121A;stroke:none;opacity:.7}
.button{fill:#F5ECD8;stroke:#8B7040;stroke-width:.9}
.button-hole-dot{fill:#8B7040}
.buttonhole{fill:#EEE;stroke:#08121A;stroke-width:.7}
.emb-guide{fill:rgba(196,151,58,.1);stroke:#C4973A;stroke-width:.7;stroke-dasharray:3,2}
.patch-guide{fill:rgba(196,151,58,.08);stroke:#C4973A;stroke-width:.7;stroke-dasharray:3,2}
.label-guide{fill:rgba(196,151,58,.08);stroke:#C4973A;stroke-width:.6;stroke-dasharray:2.5,2}
.guide-cross{stroke:#C4973A;stroke-width:.6}
.vent-overlap{fill:rgba(180,180,180,.18);stroke:#999;stroke-width:.6;stroke-dasharray:3,2}
.interlining{stroke:#bbb;stroke-width:.4}
.callout-line{stroke:#08121A;stroke-width:.45}
.dim{stroke:#CC3300;stroke-width:.45}
.dim-text,.dim-label{font-family:Arial;font-size:7px;fill:#CC3300}
.ann{font-family:Arial;font-size:8px;fill:#222;dominant-baseline:middle}
.guide-label{font-family:Arial;font-size:6.5px;fill:#B8860B;font-weight:bold;text-transform:uppercase}
.guide-sublabel{font-family:Arial;font-size:5.5px;fill:#B8860B}
.guide-label-sm{font-family:Arial;font-size:5px;fill:#B8860B;font-weight:bold}
.layer-id{font-family:monospace;font-size:5.5px;fill:#CCCCCC;opacity:.8}
.title-block{fill:#08121A;stroke:none}
.section-header{fill:#08121A;stroke:none}
.title-brand{font-family:Arial;font-size:13px;font-weight:bold;fill:#C4973A;dominant-baseline:middle}
.title-sub{font-family:Arial;font-size:10px;fill:#FAF1E5;dominant-baseline:middle}
.title-view{font-family:Arial;font-size:10px;fill:#FAF1E5;dominant-baseline:middle;display:none}
.title-meta{font-family:Arial;font-size:8px;fill:rgba(250,241,229,.55);dominant-baseline:middle}
.view-label{font-family:Arial;font-size:10px;font-weight:bold;fill:#08121A;letter-spacing:.1em;text-transform:uppercase}
.view-frame{fill:none;stroke:#CCCCCC;stroke-width:.5}
.detail-frame{fill:none;stroke:#CCCCCC;stroke-width:.6}
.detail-heading{font-family:Arial;font-size:9px;font-weight:bold;fill:#08121A;text-transform:uppercase;letter-spacing:.06em}
.detail-sub{font-family:Arial;font-size:7px;fill:#555;dominant-baseline:middle}
.note-text{font-family:Arial;font-size:7px;fill:#666}
.body-mini{fill:#F8F4EF;stroke:#08121A;stroke-width:1}
.section-label{font-family:Arial;font-size:8.5px;fill:#FAF1E5;font-weight:bold;dominant-baseline:middle;letter-spacing:.04em}
</style>
</head>
